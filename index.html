<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yonanss</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0;overflow:hidden;}
.container{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;}
.glow{font-size:3rem;font-weight:800;background:linear-gradient(90deg,#38bdf8,#a78bfa);-webkit-background-clip:text;color:transparent;}
.subtitle{margin-top:10px;color:#94a3b8;}
.btn{margin-top:30px;padding:12px 28px;border-radius:999px;background:linear-gradient(90deg,#38bdf8,#a78bfa);color:#0f172a;text-decoration:none;font-weight:600;transition:0.3s;}
.btn:hover{transform:scale(1.1);}
.circle{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,#38bdf855,transparent);top:-100px;left:-100px;filter:blur(80px);}
.circle2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,#a78bfa55,transparent);bottom:-100px;right:-100px;filter:blur(80px);}
</style>
</head>
<body>
<div class="circle"></div>
<div class="circle2"></div>
<div class="container">
<h1 class="glow">Yonanss 🚀</h1>
<p class="subtitle">Welcome to my aesthetic website</p>
<a class="btn" href="https://github.com/yonanss">GitHub</a>
</div>
</body>
</html>
